<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | FC Cleaning Company Ltd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-header"></div>

  <main class="page-main">
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Contact</p>
        <h1>Get in touch</h1>
        <p class="lead narrow">Tell us about your workplace and we’ll get back to you with the next steps.</p>
      </div>
    </section>

    <section class="section">
      <div class="container contact-grid">
        <form
          class="contact-form"
          id="contact-form"
          action="https://formspree.io/f/mzdjyqnv"
          method="POST"
        >
          <label>
            Name
            <input type="text" name="name" placeholder="Your name" required />
          </label>

          <label>
            Business Name
            <input type="text" name="business_name" placeholder="Company name" required />
          </label>

          <label>
            Email
            <input type="email" name="email" placeholder="name@company.com" required />
          </label>

          <label>
            Phone
            <input type="tel" name="phone" placeholder="Phone number" />
          </label>

          <label>
            Postcode
            <input type="text" name="postcode" placeholder="Postcode" />
          </label>

          <label>
            Type of Premises
            <input
              type="text"
              name="premises_type"
              placeholder="Office, communal area, other"
            />
          </label>

          <label>
            Message
            <textarea
              name="message"
              rows="6"
              placeholder="Tell us about your requirements"
              required
            ></textarea>
          </label>

          <input
            type="hidden"
            name="_subject"
            value="New enquiry from FC Cleaning Company website"
          />

          <button class="btn btn-primary" type="submit">Send Enquiry</button>
          <p id="form-status" style="margin-top: 12px; color: #0f8b8d; font-weight: 600;"></p>
        </form>

        <aside class="contact-panel">
          <div class="info-box">
            <h3>Phone</h3>
            <p>0161 399 0482</p>
          </div>
          <div class="info-box">
            <h3>Email</h3>
            <p>fernando.c@fccleaningcompany.com</p>
          </div>
          <div class="info-box">
            <h3>Location</h3>
            <p>Manchester, UK</p>
          </div>
          <div class="info-box">
            <h3>Hours</h3>
            <p>Mon–Fri, 8:00–18:00</p>
          </div>
        </aside>
      </div>
    </section>
  </main>

 <div id="site-footer"></div>

 <script src="includes.js"></script>

  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: {
            "Accept": "application/json"
          }
        });

        if (response.ok) {
          form.reset();
          window.location.href = "thank-you.html";
        } else {
          status.textContent = "Sorry, there was a problem sending your enquiry. Please try again.";
        }
      } catch (error) {
        status.textContent = "Sorry, there was a problem sending your enquiry. Please try again.";
      }
    });
  </script>

    <!-- Mobile nav toggle script -->
<script src="includes.js"></script>


</body>
</html>
